<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#080c1a"/>
      <stop offset="100%" stop-color="#060010"/>
    </linearGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="55%" stop-color="#7722ff"/>
      <stop offset="100%" stop-color="#cc00ee"/>
    </linearGradient>
    <radialGradient id="center-glow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#2244ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#2244ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-heavy" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="glow-soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
    <clipPath id="shape">
      <rect width="1024" height="1024" rx="230"/>
    </clipPath>
  </defs>

  <g clip-path="url(#shape)">
    <!-- Dark bg -->
    <rect width="1024" height="1024" fill="url(#bg)"/>
    <!-- Center radial glow -->
    <circle cx="512" cy="490" r="400" fill="url(#center-glow)"/>

    <!-- Timeline tracks (motion graphics aesthetic) -->
    <line x1="80" y1="388" x2="944" y2="388" stroke="rgba(255,255,255,0.055)" stroke-width="1.5"/>
    <line x1="80" y1="512" x2="944" y2="512" stroke="rgba(255,255,255,0.035)" stroke-width="1"/>
    <line x1="80" y1="636" x2="944" y2="636" stroke="rgba(255,255,255,0.055)" stroke-width="1.5"/>

    <!-- Keyframe diamonds on tracks -->
    <!-- Top-left keyframe (cyan) -->
    <rect x="178" y="366" width="44" height="44" rx="4"
          transform="rotate(45 200 388)"
          fill="rgba(0,229,255,0.15)" stroke="rgba(0,229,255,0.6)" stroke-width="2.5"/>
    <!-- Bottom-right keyframe (purple) -->
    <rect x="802" y="614" width="44" height="44" rx="4"
          transform="rotate(45 824 636)"
          fill="rgba(200,0,240,0.15)" stroke="rgba(200,0,240,0.6)" stroke-width="2.5"/>
    <!-- Small dots on tracks -->
    <circle cx="310" cy="388" r="4.5" fill="rgba(0,229,255,0.35)"/>
    <circle cx="460" cy="388" r="3"   fill="rgba(0,229,255,0.18)"/>
    <circle cx="714" cy="636" r="4.5" fill="rgba(200,0,240,0.35)"/>
    <circle cx="560" cy="636" r="3"   fill="rgba(200,0,240,0.18)"/>

    <!-- Ghost bolt glow -->
    <path d="M594 150 L350 548 L514 548 L420 872 L706 432 L530 432 Z"
          fill="#5533ff" opacity="0.45" filter="url(#blur-heavy)"
          transform="matrix(1.1,0,0,1.1,-51,-46)"/>

    <!-- Main lightning bolt -->
    <path d="M594 150 L350 548 L514 548 L420 872 L706 432 L530 432 Z"
          fill="url(#grad)" filter="url(#glow-soft)"/>

    <!-- Border -->
    <rect width="1024" height="1024" rx="230"
          fill="none" stroke="rgba(255,255,255,0.055)" stroke-width="2"/>
  </g>
</svg>
